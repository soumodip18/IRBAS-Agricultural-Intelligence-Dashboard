name: Manual Mandi Baseline Scraper
on:
  workflow_dispatch:

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Cloud Dependencies
        run: pip install selenium webdriver-manager pandas google-api-python-client google-auth-httplib2 google-auth-oauthlib lxml

      - name: Execute National Scraper
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: python scripts/cloud_pipeline.py
